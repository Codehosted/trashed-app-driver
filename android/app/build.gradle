apply plugin: 'com.android.application'

def envValue = { String name ->
    def value = System.getenv(name)
    value == null ? null : value.trim()
}

def signingEnvironment = [
    keystore: envValue('TRASHED_ANDROID_KEYSTORE'),
    alias: envValue('TRASHED_ANDROID_KEY_ALIAS'),
    storePassword: envValue('TRASHED_ANDROID_KEYSTORE_PASSWORD'),
    keyPassword: envValue('TRASHED_ANDROID_KEY_PASSWORD')
]
def hasAnySigningValue = signingEnvironment.values().any { it }
def hasCompleteSigningEnvironment = signingEnvironment.values().every { it }
def requireSigning = envValue('TRASHED_REQUIRE_SIGNING')?.toBoolean() ?: false
def configuredVersionCode = (envValue('TRASHED_ANDROID_VERSION_CODE') ?: '1').toInteger()
def configuredVersionName = envValue('TRASHED_ANDROID_VERSION_NAME') ?: '1.0'

if (hasAnySigningValue && !hasCompleteSigningEnvironment) {
    throw new GradleException('Android release signing is partially configured; all TRASHED_ANDROID_* signing variables are required')
}
if (requireSigning && !hasCompleteSigningEnvironment) {
    throw new GradleException('TRASHED_REQUIRE_SIGNING=true but Android release signing is not configured')
}
if (hasCompleteSigningEnvironment && !file(signingEnvironment.keystore).isFile()) {
    throw new GradleException('TRASHED_ANDROID_KEYSTORE does not point to a readable file')
}

android {
    namespace "com.trashed.driver"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.trashed.driver"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode configuredVersionCode
        versionName configuredVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        if (hasCompleteSigningEnvironment) {
            release {
                storeFile file(signingEnvironment.keystore)
                storePassword signingEnvironment.storePassword
                keyAlias signingEnvironment.alias
                keyPassword signingEnvironment.keyPassword
                enableV1Signing true
                enableV2Signing true
                enableV3Signing true
                enableV4Signing true
            }
        }
    }
    buildTypes {
        release {
            if (hasCompleteSigningEnvironment) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "com.google.android.gms:play-services-auth:21.3.0"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
